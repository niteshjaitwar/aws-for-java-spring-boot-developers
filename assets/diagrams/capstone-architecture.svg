<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Capstone production architecture</title>
  <desc id="desc">Architecture diagram showing browser traffic through Nginx to a Spring Boot EC2 app with S3 and Lambda integration.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0a1422"/>
      <stop offset="100%" stop-color="#172c44"/>
    </linearGradient>
    <linearGradient id="aws" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffb74d"/>
      <stop offset="100%" stop-color="#fb8c00"/>
    </linearGradient>
    <linearGradient id="app" x1="0" x2="1">
      <stop offset="0%" stop-color="#7bd389"/>
      <stop offset="100%" stop-color="#2f855a"/>
    </linearGradient>
    <linearGradient id="data" x1="0" x2="1">
      <stop offset="0%" stop-color="#63b3ed"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>
  <rect width="1600" height="960" fill="url(#bg)"/>
  <text x="70" y="90" fill="#ffffff" font-size="52" font-family="Segoe UI, Arial, sans-serif" font-weight="700">Production Learning Path</text>
  <text x="70" y="135" fill="#bfd7f2" font-size="24" font-family="Segoe UI, Arial, sans-serif">One clear path from browser request to AWS services</text>

  <g filter="url(#shadow)" font-family="Segoe UI, Arial, sans-serif">
    <rect x="90" y="250" width="240" height="120" rx="24" fill="#f7fafc"/>
    <rect x="430" y="220" width="320" height="180" rx="28" fill="url(#aws)"/>
    <rect x="820" y="220" width="320" height="180" rx="28" fill="url(#app)"/>
    <rect x="1210" y="160" width="260" height="140" rx="24" fill="url(#data)"/>
    <rect x="1210" y="360" width="260" height="140" rx="24" fill="url(#data)"/>
    <rect x="1210" y="560" width="260" height="140" rx="24" fill="#9f7aea"/>
    <rect x="430" y="520" width="320" height="150" rx="28" fill="#1f3b5c"/>
    <rect x="820" y="520" width="320" height="150" rx="28" fill="#20473a"/>
  </g>

  <g font-family="Segoe UI, Arial, sans-serif">
    <text x="145" y="320" fill="#10223a" font-size="30" font-weight="700">Browser / User</text>

    <text x="470" y="285" fill="#1e293b" font-size="30" font-weight="700">EC2 Instance</text>
    <text x="470" y="330" fill="#1e293b" font-size="22">- Amazon Linux 2023</text>
    <text x="470" y="365" fill="#1e293b" font-size="22">- Nginx on port 80</text>

    <text x="860" y="285" fill="#f7fafc" font-size="30" font-weight="700">Spring Boot App</text>
    <text x="860" y="330" fill="#f7fafc" font-size="22">- Todo API</text>
    <text x="860" y="365" fill="#f7fafc" font-size="22">- Runs with systemd</text>

    <text x="1245" y="225" fill="#ffffff" font-size="28" font-weight="700">Amazon S3</text>
    <text x="1245" y="265" fill="#e6f3ff" font-size="20">Private uploads</text>

    <text x="1235" y="425" fill="#ffffff" font-size="28" font-weight="700">AWS Lambda</text>
    <text x="1235" y="465" fill="#e6f3ff" font-size="20">Background jobs</text>

    <text x="1235" y="625" fill="#ffffff" font-size="28" font-weight="700">CloudWatch</text>
    <text x="1235" y="665" fill="#efe7ff" font-size="20">Logs and alarms</text>

    <text x="470" y="585" fill="#ffffff" font-size="28" font-weight="700">GitHub Actions</text>
    <text x="470" y="625" fill="#d7e8ff" font-size="20">Build, test, package</text>

    <text x="860" y="585" fill="#ffffff" font-size="28" font-weight="700">IAM Role</text>
    <text x="860" y="625" fill="#e4fff0" font-size="20">No hardcoded AWS keys</text>
  </g>

  <g stroke-linecap="round" stroke-width="8" fill="none">
    <path d="M330 310 H430" stroke="#ffffff"/>
    <path d="M750 310 H820" stroke="#ffd166"/>
    <path d="M1140 250 H1210" stroke="#7bd389"/>
    <path d="M1140 405 H1210" stroke="#7bd389"/>
    <path d="M980 400 V520" stroke="#7bd389"/>
    <path d="M590 520 V430" stroke="#6cb2ff"/>
    <path d="M1140 610 H1210" stroke="#c4a1ff"/>
  </g>

  <g fill="#dfefff" font-family="Segoe UI, Arial, sans-serif">
    <text x="70" y="820" font-size="34" font-weight="700">Deployment story</text>
    <text x="70" y="870" font-size="22">1. Reader builds and tests locally with Maven Wrapper</text>
    <text x="70" y="905" font-size="22">2. GitHub Actions validates changes, then EC2 runs the packaged Spring Boot JAR behind Nginx</text>
  </g>
</svg>
