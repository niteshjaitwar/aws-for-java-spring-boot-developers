<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AWS for Java Spring Boot Developers roadmap</title>
  <desc id="desc">Colorful roadmap for Spring Boot developers learning AWS from account setup to production deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#08111f"/>
      <stop offset="50%" stop-color="#10223a"/>
      <stop offset="100%" stop-color="#152d49"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffb347"/>
      <stop offset="100%" stop-color="#ffcc33"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" x2="1">
      <stop offset="0%" stop-color="#68d391"/>
      <stop offset="100%" stop-color="#38b2ac"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" x2="1">
      <stop offset="0%" stop-color="#63b3ed"/>
      <stop offset="100%" stop-color="#4c51bf"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" x2="1">
      <stop offset="0%" stop-color="#f687b3"/>
      <stop offset="100%" stop-color="#d53f8c"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1320" cy="120" r="180" fill="#1f4b7a" opacity="0.25"/>
  <circle cx="230" cy="760" r="160" fill="#0f6b78" opacity="0.18"/>
  <text x="90" y="120" fill="#ffffff" font-size="54" font-family="Segoe UI, Arial, sans-serif" font-weight="700">AWS for Java Spring Boot Developers</text>
  <text x="90" y="170" fill="#b9d4f0" font-size="24" font-family="Segoe UI, Arial, sans-serif">A real, step-by-step learning path by niteshjaitwar</text>

  <g filter="url(#shadow)">
    <rect x="90" y="250" rx="28" ry="28" width="300" height="220" fill="url(#card1)"/>
    <rect x="460" y="250" rx="28" ry="28" width="300" height="220" fill="url(#card2)"/>
    <rect x="830" y="250" rx="28" ry="28" width="300" height="220" fill="url(#card3)"/>
    <rect x="1200" y="250" rx="28" ry="28" width="300" height="220" fill="url(#card4)"/>
  </g>

  <g fill="#10223a" font-family="Segoe UI, Arial, sans-serif">
    <text x="120" y="315" font-size="30" font-weight="700">1. Account Setup</text>
    <text x="120" y="360" font-size="20">- Sign up safely</text>
    <text x="120" y="392" font-size="20">- Enable MFA</text>
    <text x="120" y="424" font-size="20">- Create budget alerts</text>
    <text x="120" y="456" font-size="20">- Configure CLI access</text>

    <text x="490" y="315" font-size="30" font-weight="700">2. Core Services</text>
    <text x="490" y="360" font-size="20">- IAM and regions</text>
    <text x="490" y="392" font-size="20">- EC2 deployment basics</text>
    <text x="490" y="424" font-size="20">- S3 storage patterns</text>
    <text x="490" y="456" font-size="20">- Lambda fundamentals</text>

    <text x="860" y="315" font-size="30" font-weight="700">3. Real Projects</text>
    <text x="860" y="360" font-size="20">- Todo API on EC2</text>
    <text x="860" y="392" font-size="20">- S3 file upload service</text>
    <text x="860" y="424" font-size="20">- Java Lambda handler</text>
    <text x="860" y="456" font-size="20">- Maven Wrapper included</text>

    <text x="1230" y="315" font-size="30" font-weight="700">4. Production Path</text>
    <text x="1230" y="360" font-size="20">- Nginx reverse proxy</text>
    <text x="1230" y="392" font-size="20">- systemd service</text>
    <text x="1230" y="424" font-size="20">- GitHub Actions CI</text>
    <text x="1230" y="456" font-size="20">- Logging and cost checks</text>
  </g>

  <path d="M390 360 H460" stroke="#ffd166" stroke-width="8" stroke-linecap="round"/>
  <path d="M760 360 H830" stroke="#90f1b8" stroke-width="8" stroke-linecap="round"/>
  <path d="M1130 360 H1200" stroke="#8ec5ff" stroke-width="8" stroke-linecap="round"/>

  <g fill="#dfefff" font-family="Segoe UI, Arial, sans-serif">
    <text x="90" y="610" font-size="36" font-weight="700">What makes this repo different?</text>
    <text x="90" y="660" font-size="24">- Up-to-date AWS terminology and commands</text>
    <text x="90" y="700" font-size="24">- Beginner-friendly explanations without skipping setup steps</text>
    <text x="90" y="740" font-size="24">- Real Java projects you can build, test, and deploy</text>
    <text x="90" y="780" font-size="24">- Clear path from local development to AWS production basics</text>
  </g>
</svg>
